name: Benchmark
on: push
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: go build main.go
      - name: Install other languages
        run: |
          sudo apt update
          sudo apt install software-properties-common
          sudo add-apt-repository ppa:ondrej/php
          sudo apt update
          sudo apt install php8.1-cli
          sudo apt install ruby-full
      - name: Benchmark and compare
        run: |
          /usr/bin/time -f 'YZ took %e seconds.' ./main benchmarking/test.yz > /dev/null
          /usr/bin/time -f 'PHP took %e seconds.' php8.1 benchmarking/test.php > /dev/null
          /usr/bin/time -f 'Ruby took %e seconds.' ruby benchmarking/test.rb > /dev/null
      - name: Make sure runtime is below 5 seconds
        run: |
          min=999
          for i in 1 2 3; do
            t=$(/usr/bin/time -f '%e' ./main benchmarking/test.yz 2>&1 >/dev/null)
            min=$(awk "BEGIN{print ($t < $min) ? $t : $min}")
          done
          echo $min
          awk "BEGIN{exit !($min < 5.00)}"