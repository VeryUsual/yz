name: Benchmark
on: push
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: go build main.go
      - name: Install PHP
        run: |
          sudo apt update
          sudo apt install php8.1-cli
      - name: Benchmark and compare
        run: |
          /usr/bin/time -f '%e' ./main benchmarking/print.yz > /dev/null
          /usr/bin/time -f '%e' php8.1 benchmarking/print.php > /dev/null